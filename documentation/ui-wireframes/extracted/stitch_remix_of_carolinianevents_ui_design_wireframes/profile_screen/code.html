</div>

<script>
        // Simple micro-interaction for event cards
        document.querySelectorAll('.event-card-shadow').forEach(card => {
            card.addEventListener('click', () => {
                card.classList.add('bg-primary/5');
                setTimeout(() => {
                    card.classList.remove('bg-primary/5');
                }, 150);
            });
        });
    </script>
