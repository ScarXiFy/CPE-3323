<style>
        body {
            background-color: #f8f9fa;
            color: #191c1d;
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .login-card {
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .input-group:focus-within label {
            color: #003fb1;
            transform: translateY(-24px) scale(0.85);
        }
        .input-field:focus {

<body class="min-h-screen flex items-center justify-center p-md overflow-x-hidden">
<!-- Atmospheric Background Element -->
<div class="fixed inset-0 pointer-events-none z-0 overflow-hidden">
<div class="absolute -top-[10%] -left-[10%] w-[40%] h-[40%] rounded-full bg-primary/5 blur-[120px]"></div>
<div class="absolute top-[60%] -right-[5%] w-[30%] h-[30%] rounded-full bg-secondary-container/10 blur-[100px]"></div>
</div>
<!-- Main Content Wrapper -->
<main class="relative z-10 w-full max-w-[400px] flex flex-col items-center">
<!-- Brand Identity Section -->
<header class="flex flex-col items-center mb-xl animate-in fade-in slide-in-from-bottom-4 duration-700">
<div class="w-20 h-20 mb-md rounded-xl overflow-hidden shadow-sm">
<img alt="CarolinianEvents Logo" class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDGryXEoM4SFmDo4crRdVngkPvA-P03iVRAbjtl57QeK1J0gPG5won_mbyagDgmiq70kaJR2vleMsFu1qNA4pp-QrbHDGWsoLY-8gqA4NoyosIiNgQmzAdd-mCsXm_1JZCsnEYfqN4lkF15DMdROzAd5DJDIrmcAeDTcK8h-8T6Kh4ldZVv2_k8sP0LWxMwL-1bFVQUjzteq3tQ5_jQu-Re0pFFFe69ySyWOrugowgesAWt_U-W5UHFqQ">
</div>
<h1 class="font-headline-lg text-headline-lg text-on-background tracking-tight">CarolinianEvents</h1>
<p class="font-body-md text-body-md text-on-surface-variant mt-xs">Sign in to your campus life</p>
</header>
<!-- Login Card -->
<section class="w-full bg-surface-container-lowest border border-outline-variant rounded-xl p-xl shadow-sm login-card animate-in fade-in slide-in-from-bottom-8 duration-1000 delay-100" style="transform: rotateY(0deg) rotateX(0deg);">
<form class="flex flex-col gap-lg" id="loginForm">
<!-- Email Field -->
<div class="relative flex flex-col gap-xs group">
<label class="font-label-lg text-label-lg text-outline group-focus-within:text-primary transition-all duration-200" for="email">Email Address</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-md top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors">mail</span>
<input class="w-full h-14 pl-[48px] pr-md bg-surface-container-low border border-outline-variant rounded-lg font-body-lg text-body-lg focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all duration-200" id="email" placeholder="name@university.edu" required="" type="email">
</div>
</div>
<!-- Password Field -->
<div class="relative flex flex-col gap-xs group">
<div class="flex justify-between items-center">
<label class="font-label-lg text-label-lg text-outline group-focus-within:text-primary transition-all duration-200" for="password">Password</label>
<a class="font-label-lg text-label-lg text-primary hover:underline transition-all" href="#">Forgot?</a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-md top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors">lock</span>
<input class="w-full h-14 pl-[48px] pr-12 bg-surface-container-low border border-outline-variant rounded-lg font-body-lg text-body-lg focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all duration-200" id="password" placeholder="••••••••" required="" type="password">
<button class="absolute right-md top-1/2 -translate-y-1/2 text-outline hover:text-on-surface transition-colors flex items-center justify-center" onclick="togglePasswordVisibility()" type="button">
<span class="material-symbols-outlined" id="passwordIcon">visibility</span>
</button>
</div>
</div>
<!-- Primary Action -->
<button class="w-full h-14 bg-primary-container text-on-primary font-title-lg text-title-lg rounded-lg shadow-md hover:bg-primary hover:shadow-lg active:scale-95 transition-all duration-200 flex items-center justify-center gap-sm mt-md" type="submit">
<span class="">Log In</span>
<span class="material-symbols-outlined">arrow_forward</span>
</button>
</form>
<!-- Social/Alternative Divider -->

<!-- Single Sign On Option (Standard in Campus Apps) -->

</section>
<!-- Footer Links -->
<footer class="mt-xl text-center animate-in fade-in slide-in-from-bottom-2 duration-1000 delay-300">
<p class="font-body-md text-body-md text-on-surface-variant">
                Don't have an account? 
                <a class="text-primary font-semibold hover:underline transition-all" href="#">Register here</a>
</p>
<div class="flex items-center justify-center gap-xl mt-xl">
<a class="font-label-lg text-label-lg text-outline hover:text-on-surface-variant transition-colors" href="#">Privacy Policy</a>
<a class="font-label-lg text-label-lg text-outline hover:text-on-surface-variant transition-colors" href="#">Terms of Service</a>
</div>
</footer>
</main>
<script>
        // Micro-interaction for password visibility
        function togglePasswordVisibility() {
            const passwordInput = document.getElementById('password');
            const passwordIcon = document.getElementById('passwordIcon');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                passwordIcon.innerText = 'visibility_off';
            } else {
                passwordInput.type = 'password';
                passwordIcon.innerText = 'visibility';
            }
        }

        // Form submission animation handling
        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            const originalContent = btn.innerHTML;
            
            // Visual feedback
            btn.disabled = true;
            btn.innerHTML = `
                <svg class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                <span>Authenticating...</span>
            `;
            
            // Simulate API call
            setTimeout(() => {
                btn.innerHTML = originalContent;
                btn.disabled = false;
                alert('Login successful! Welcome back to CarolinianEvents.');
            }, 2000);
        });

        // Add subtle mouse-tracking parallax effect to the card
        document.addEventListener('mousemove', (e) => {
            const card = document.querySelector('.login-card');
            const xAxis = (window.innerWidth / 2 - e.pageX) / 50;
            const yAxis = (window.innerHeight / 2 - e.pageY) / 50;
            card.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
        });
        
        // Reset card on mouse leave
        document.addEventListener('mouseleave', () => {
            const card = document.querySelector('.login-card');
            card.style.transform = `rotateY(0deg) rotateX(0deg)`;
        });
    </script>


</body></html>
