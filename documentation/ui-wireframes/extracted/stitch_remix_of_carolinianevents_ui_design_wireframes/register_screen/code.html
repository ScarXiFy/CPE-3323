<style>

            transform: translateY(-24px) scale(0.85);
            color: #003fb1;
            background: #f8f9fa;
            padding: 0 4px;
        }
        input:focus + label,
        input:not(:placeholder-shown) + label {

            color: #003fb1;

<body class="bg-background text-on-background font-body-lg min-h-screen flex flex-col items-center justify-center">
<!-- Auth Background Element -->
<div class="fixed inset-0 -z-10 overflow-hidden opacity-20">
<div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-primary rounded-full blur-[120px]"></div>
<div class="absolute bottom-[-5%] right-[-5%] w-[30%] h-[30%] bg-secondary rounded-full blur-[100px]"></div>
</div>
<!-- Main Registration Container -->
<main class="w-full max-w-md px-container-padding py-xl flex flex-col gap-xl">
<!-- Brand Header -->
<header class="flex flex-col items-center gap-sm text-center">
<div class="w-16 h-16 bg-primary-container text-on-primary rounded-2xl flex items-center justify-center shadow-lg mb-4">
<span class="material-symbols-outlined text-4xl" data-icon="event_note">event_note</span>
</div>
<h1 class="font-display-lg text-display-lg text-primary tracking-tight">CarolinianEvents</h1>
<p class="font-body-lg text-on-surface-variant max-w-[280px]">Join the community and never miss a campus moment.</p>
</header>
<!-- Form Section -->
<div class="bg-surface-container-lowest rounded-[24px] p-lg shadow-sm border border-outline-variant/30">
<form class="flex flex-col gap-lg" onsubmit="event.preventDefault();">
<!-- Full Name Field -->
<div class="relative">
<input class="peer w-full h-14 px-md rounded-lg border border-outline bg-transparent text-on-surface outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all" id="fullname" placeholder=" " type="text">
<label class="absolute left-md top-4 text-on-surface-variant font-body-md transition-all pointer-events-none origin-left" for="fullname">Full Name</label>
</div>
<!-- Email Field -->
<div class="relative">
<input class="peer w-full h-14 px-md rounded-lg border border-outline bg-transparent text-on-surface outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all" id="email" placeholder=" " type="email">
<label class="absolute left-md top-4 text-on-surface-variant font-body-md transition-all pointer-events-none origin-left" for="email">Email Address</label>
</div>
<!-- Password Field -->
<div class="relative">
<input class="peer w-full h-14 px-md rounded-lg border border-outline bg-transparent text-on-surface outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all" id="password" placeholder=" " type="password">
<label class="absolute left-md top-4 text-on-surface-variant font-body-md transition-all pointer-events-none origin-left" for="password">Password</label>
</div>
<!-- Confirm Password Field -->
<div class="relative">
<input class="peer w-full h-14 px-md rounded-lg border border-outline bg-transparent text-on-surface outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all" id="confirm_password" placeholder=" " type="password">
<label class="absolute left-md top-4 text-on-surface-variant font-body-md transition-all pointer-events-none origin-left" for="confirm_password">Confirm Password</label>
</div>
<!-- Register Button -->
<button class="w-full h-14 bg-primary-container text-on-primary font-title-lg rounded-xl shadow-md hover:bg-primary transition-all active:scale-[0.98] mt-sm flex items-center justify-center gap-2">
<span class="">Register</span>
<span class="material-symbols-outlined text-xl" data-icon="arrow_forward">arrow_forward</span>
</button>
</form>
<!-- Social/Alternative Divider -->

<!-- Alternative Sign Up -->
<div class="grid grid-cols-2 gap-md">


</div>
</div>
<!-- Footer Link -->
<footer class="text-center">
<p class="font-body-md text-on-surface-variant">
                Already have an account? 
                <a class="text-primary font-title-lg hover:underline decoration-2 underline-offset-4 transition-all ml-1" href="#">Log In</a>
</p>
</footer>
</main>
<!-- Illustrative Background Image (Hidden on very small mobile) -->

</div>
<script>
        // Simple micro-interaction for button feedback
        document.querySelectorAll('button').forEach(btn => {
            btn.addEventListener('mousedown', () => {
                btn.style.transform = 'scale(0.96)';
            });
            btn.addEventListener('mouseup', () => {
                btn.style.transform = '';
            });
            btn.addEventListener('mouseleave', () => {
                btn.style.transform = '';
            });
        });

        // Floating labels logic for MD3 fields
        const inputs = document.querySelectorAll('input');
        inputs.forEach(input => {
            input.addEventListener('focus', () => {
                input.nextElementSibling.classList.add('focused-label');
            });
            input.addEventListener('blur', () => {
                if (!input.value) {
                    input.nextElementSibling.classList.remove('focused-label');
                }
            });
        });
    </script>
