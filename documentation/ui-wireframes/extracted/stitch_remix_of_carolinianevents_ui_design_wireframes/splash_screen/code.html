<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        /* MD3 Circular Progress Indicator Animation */
        @keyframes rotate {
            100% { transform: rotate(360deg); }
        }
        @keyframes dash {
            0% { stroke-dasharray: 1, 150; stroke-dashoffset: 0; }
            50% { stroke-dasharray: 90, 150; stroke-dashoffset: -35; }
            100% { stroke-dasharray: 90, 150; stroke-dashoffset: -124; }
        }
        .spinner {
            animation: rotate 2s linear infinite;
        }
        .spinner circle {
            stroke-linecap: round;
            animation: dash 1.5s ease-in-out infinite;
        }

        /* Fade in animations */
        .fade-in {
            animation: fadeIn 0.8s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Subtle Background Pulse */
        .bg-pulse {
            background: radial-gradient(circle at center, #1a56db 0%, #003fb1 100%);
        }
    </style>

<!-- Micro-interaction Script -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            // Simulate a splash screen timeout for demonstration
            // In a real app, this would redirect once data is loaded
            /*
            setTimeout(() => {
                document.body.classList.add('transition-opacity', 'duration-500', 'opacity-0');
                setTimeout(() => {
                    window.location.href = '/dashboard'; // Redirect path
                }, 500);
            }, 3000);
            */

            // Interactive parallax-like effect on mouse move
            document.addEventListener('mousemove', (e) => {
                const moveX = (e.clientX - window.innerWidth / 2) / 50;
                const moveY = (e.clientY - window.innerHeight / 2) / 50;
                const container = document.querySelector('main');
                if (container) {
                    container.style.transform = `translate(${moveX}px, ${moveY}px)`;
                }
            });
        });
    </script>
